services:
  backend:
    build: ./backend
    volumes:
      - ${HOME}/data/sqlite:/data/sqlite
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    env_file:
      - ./backend/.env
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - backend
      - frontend
    restart: unless-stopped